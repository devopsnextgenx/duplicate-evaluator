version: '3.9'

services:
  duplicate-evaluator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: duplicate-evaluator
    ports:
      - '8765:8765'
    environment:
      # Override the media root inside the container.
      DUPEVAL_TARGET_PATH: /data/media
      # LLM endpoint configuration
      DUPEVAL_LLM_HOST: host.docker.internal
      DUPEVAL_LLM_PORT: 11434
      # Server configuration
      DUPEVAL_HOST: 0.0.0.0
      DUPEVAL_PORT: 8765
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ${TARGET_PATH:-/media/zbox/Crucial-X6/ShareMe/media/songs/target}:/data/media:rw
    restart: unless-stopped
