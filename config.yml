ollamserver:
  host: "0.0.0.0"
  port: 8765

media:
  # Full path to the root media folder containing Language sub-folders
  target_path: "/media/zbox/Crucial-X6/ShareMe/media/songs/target"

llm:
  # provider: ollama | lmstudio | llamacpp
  provider: "ollama"
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"
  model: "qwen2.5:latest" # "llama3.2", "gemma3:latest", "qwen2.5"
  temperature: 0.1
  max_tokens: 4096
  # Max number of file names to include per LLM batch call
  batch_size: 100

thumbnails:
  # Thumbnails are currently disabled (NoOp). Set enabled: true when ready.
  enabled: false

logging:
  level: "INFO"
  log_file: "logs/app.log"
  max_bytes: 10485760   # 10 MB
  backup_count: 5
